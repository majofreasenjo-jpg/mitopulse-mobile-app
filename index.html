<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nodo MitoPulse</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e1b4b">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3067/3067443.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
body {font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: #f8fafc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;}
.wrap {width: 100%; max-width: 480px; padding: 24px; box-sizing: border-box;}
.status {text-align: center; font-size: 16px; font-weight: 700; color: #a78bfa; letter-spacing: 3px; margin-bottom: 24px; text-transform: uppercase;}
.orb {width: 220px; height: 220px; border-radius: 50%; margin: 0 auto 32px; background: radial-gradient(circle at 30% 30%, #a78bfa 0%, #6366f1 50%, #312e81 100%); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4), inset 0 -10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);}
.orb::after {content:''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 40%); border-radius: 50%; pointer-events: none;}
.card {background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);}
.muted {color: #cbd5e1; font-size: 12px; font-weight: 500; letter-spacing: 1px; margin-bottom: 8px;}
h1 {font-size: 28px; margin: 0 0 16px; font-weight: 300; background: linear-gradient(to right, #e2e8f0, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.mono {font-family: 'Courier New', monospace; color: #34d399; font-size: 13px; margin-top: 8px; line-height: 1.4; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3);}
.btn {display: block; width: 100%; padding: 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: linear-gradient(145deg, #6366f1, #4f46e5); color: #fff; font-size: 16px; font-weight: 700; font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); letter-spacing: 1px;}
.btn:hover {transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4); filter: brightness(1.1);}
.btn:active {transform: translateY(1px);}
.btn-secondary {background: linear-gradient(145deg, #475569, #334155); margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
.btn-secondary:hover {box-shadow: 0 8px 25px rgba(0,0,0,0.3);}
</style></head><body><div class="wrap">
<div class="status">● Red Activa</div>
<div class="orb">CONECTADO</div>
<div class="card">
  <div class="muted">IDENTIFICADOR DE NODO</div>
  <h1 id="nodeId">node_----</h1>
  <div class="mono" id="log">&gt; Esperando latido...</div>
  <div class="mono" id="crosslog" style="margin-top:4px; color: #818cf8;">&gt; Interacciones: 0</div>
</div>
<button class="btn" onclick="emitPulse()">EMITIR LATIDO</button>
<button class="btn btn-secondary" onclick="emitCrossPulse()">CONECTAR CON NODO</button>
</div>
<script>
let nodeId = localStorage.getItem("mitopulse_node_id");
if (!nodeId) {
  nodeId = 'node_' + Math.floor(1000 + Math.random() * 9000);
  localStorage.setItem("mitopulse_node_id", nodeId);
}
document.getElementById('nodeId').textContent = nodeId;
function log(msg){document.getElementById('log').textContent='> '+msg;}
function clog(msg){document.getElementById('crosslog').textContent='> '+msg;}
async function emitPulse(){
  const p = {user_id: nodeId, scenario: "legit_transfer", amount: 0, click_count: 5, started_at: Date.now(), device_reality: 90};
  await fetch('https://mitopulse-web-v8.onrender.com/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  log('Pulso manual emitido. Aguardando señales de vida...');
}
async function emitCrossPulse(){
  const users=await (await fetch('https://mitopulse-web-v8.onrender.com/api/users')).json();
  if(users.length<2){clog('Se requieren al menos 2 nodos/usuarios'); return;}
  const a=users[0].id, b=users[1].id;
  const r=await fetch('https://mitopulse-web-v8.onrender.com/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:a,node_b:b,shared_context_score:78,temporal_delta_ms:40,source:'mobile_node'})});
  const d=await r.json();
  if(d.ok){clog(`Cross pulse confirmado: ${d.node_a} ↔ ${d.node_b}`);} else {clog('Error de cross pulse');}
}
setInterval(()=>log('Heartbeat OK | nodo sincronizado'),30000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(registration) {
      console.log('ServiceWorker registration successful with scope: ', registration.scope);
    }, function(err) {
      console.log('ServiceWorker registration failed: ', err);
    });
  });
}
</script></body></html>
