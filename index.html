<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nodo MitoPulse</title>
<style>
body{font-family:Arial;background:#000;color:#fff;margin:0}.wrap{max-width:760px;margin:auto;padding:24px}.status{text-align:center;font-size:32px;color:#6d6cff;letter-spacing:4px;margin-top:40px}.orb{width:280px;height:280px;border-radius:50%;margin:30px auto;background:radial-gradient(circle,#6d6cff 0%,#2d2d66 50%,#111 75%);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:bold;box-shadow:0 0 80px #4b4bcc}.card{background:rgba(30,41,59,.7);border-radius:24px;padding:20px;margin:20px 0}.muted{color:#94a3b8}.btn{display:block;width:100%;padding:22px;border-radius:18px;border:none;background:#6d6cff;color:#fff;font-size:20px;font-weight:bold}.mono{font-family:monospace;color:#10b981}
</style></head><body><div class="wrap">
<div class="status">STATUS: ACTIVE</div>
<div class="orb">CONNECTED</div>
<div class="card">
  <div class="muted">CRIPTOGRAFÍA DE DISPOSITIVO</div>
  <h1 id="nodeId">node_----</h1>
  <div class="mono" id="log">&gt; Esperando señales de vida...</div>
  <div class="mono" id="crosslog" style="margin-top:10px;">&gt; Cross-node sync: 0</div>
</div>
<button class="btn" onclick="emitPulse()">EMITIR PULSO MANUAL</button>
<button class="btn" style="margin-top:12px;background:#4f46e5" onclick="emitCrossPulse()">EMITIR PULSO CRUZADO</button>
</div>
<script>
let nodeId='node_'+Math.floor(1000+Math.random()*9000);
document.getElementById('nodeId').textContent=nodeId;
function log(msg){document.getElementById('log').textContent='> '+msg;}
function clog(msg){document.getElementById('crosslog').textContent='> '+msg;}
async function emitPulse(){
  const p = {user_id: nodeId, scenario: "legit_transfer", amount: 0, click_count: 5, started_at: Date.now(), device_reality: 90};
  await fetch('https://mitopulse-web-v8.onrender.com/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  log('Pulso manual emitido. Aguardando señales de vida...');
}
async function emitCrossPulse(){
  const users=await (await fetch('https://mitopulse-web-v8.onrender.com/api/users')).json();
  if(users.length<2){clog('Se requieren al menos 2 nodos/usuarios'); return;}
  const a=users[0].id, b=users[1].id;
  const r=await fetch('https://mitopulse-web-v8.onrender.com/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:a,node_b:b,shared_context_score:78,temporal_delta_ms:40,source:'mobile_node'})});
  const d=await r.json();
  if(d.ok){clog(`Cross pulse confirmado: ${d.node_a} ↔ ${d.node_b}`);} else {clog('Error de cross pulse');}
}
setInterval(()=>log('Heartbeat OK | nodo sincronizado'),30000);
</script></body></html>
